name: Deploy to GitHub Pages

on:
  # Run every 2 minutes from 9:30 to 9:40 AM EDT (13:30-13:40 UTC)
  # Plus at 10:00 AM EDT (14:00 UTC) for final capture
  # Note: Data is ~15 hours old (updates at 10AM IST / 4:30AM UTC)
  schedule:
    - cron: '0 0 * * *'     # 12:00 AM UTC (8:00 PM EDT previous day)
    - cron: '30 9 * * *'    # 5:30 AM EDT (9:30 UTC)
    - cron: '35 9 * * *'    # 5:35 AM EDT (9:35 UTC)
    - cron: '40 9 * * *'    # 5:40 AM EDT (9:40 UTC)
    - cron: '30 13 * * *'   # 9:30 AM EDT (13:30 UTC)
    - cron: '35 13 * * *'   # 9:35 AM EDT (13:35 UTC)
    - cron: '40 13 * * *'   # 9:40 AM EDT (13:40 UTC)
    - cron: '0 14 * * *'    # 10:00 AM EDT (14:00 UTC) - final capture
  # Allow manual trigger
  workflow_dispatch:
  # Deploy on push to main branch
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build static site with secrets
        env:
          MY11C_AUTH_TOKEN: ${{ secrets.MY11C_AUTH_TOKEN }}
          MY11_CLASSIC_GAME: ${{ secrets.MY11_CLASSIC_GAME }}
        run: |
          set +x  # Disable command echoing to protect secrets
          python3 build_static.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './static'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
