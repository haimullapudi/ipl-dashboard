name: Deploy to GitHub Pages

on:
  # Run every 2 minutes from 9:30 to 9:40 AM EST (14:30-14:40 UTC)
  # Plus at 10:00 AM EST (15:00 UTC) to capture final data update
  schedule:
    - cron: '30 14 * * *'   # 9:30 AM EST
    - cron: '32 14 * * *'   # 9:32 AM EST
    - cron: '34 14 * * *'   # 9:34 AM EST
    - cron: '36 14 * * *'   # 9:36 AM EST
    - cron: '38 14 * * *'   # 9:38 AM EST
    - cron: '40 14 * * *'   # 9:40 AM EST
    - cron: '0 15 * * *'    # 10:00 AM EST (final capture)
  # Allow manual trigger
  workflow_dispatch:
  # Deploy on push to main branch
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build static site with secrets
        env:
          MY11C_AUTH_TOKEN: ${{ secrets.MY11C_AUTH_TOKEN }}
          MY11_CLASSIC_GAME: ${{ secrets.MY11_CLASSIC_GAME }}
        run: |
          set +x  # Disable command echoing to protect secrets
          python3 build_static.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './static'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
