name: Deploy to GitHub Pages

on:
  # IPL API updates daily at 10:00 AM IST (4:30 AM UTC)
  # Run every 2 minutes from 4:30 to 5:00 AM UTC to capture the update
  schedule:
    - cron: '30 4 * * *'    # 4:30 AM UTC (10:00 AM IST)
    - cron: '32 4 * * *'    # 4:32 AM UTC (10:02 AM IST)
    - cron: '34 4 * * *'    # 4:34 AM UTC (10:04 AM IST)
    - cron: '36 4 * * *'    # 4:36 AM UTC (10:06 AM IST)
    - cron: '38 4 * * *'    # 4:38 AM UTC (10:08 AM IST)
    - cron: '40 4 * * *'    # 4:40 AM UTC (10:10 AM IST)
    - cron: '0 5 * * *'     # 5:00 AM UTC (10:30 AM IST) - final capture
  # Allow manual trigger
  workflow_dispatch:
  # Deploy on push to main branch
  push:
    branches:
      - main

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build static site with secrets
        env:
          MY11C_AUTH_TOKEN: ${{ secrets.MY11C_AUTH_TOKEN }}
          MY11_CLASSIC_GAME: ${{ secrets.MY11_CLASSIC_GAME }}
        run: |
          set +x  # Disable command echoing to protect secrets
          python3 build_static.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './static'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
