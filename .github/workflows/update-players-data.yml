name: Update IPL Players Data

on:
  schedule:
    # Run every 5 minutes from 9:30 AM to 10:00 AM EST (14:30-15:00 UTC)
    # During IPL match season, this captures frequent data updates around match time
    - cron: '30 14 * * *'  # 9:30 AM EST
    - cron: '35 14 * * *'  # 9:35 AM EST
    - cron: '40 14 * * *'  # 9:40 AM EST
    - cron: '45 14 * * *'  # 9:45 AM EST
    - cron: '50 14 * * *'  # 9:50 AM EST
    - cron: '55 14 * * *'  # 9:55 AM EST
    - cron: '0 15 * * *'   # 10:00 AM EST
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch latest players data
        run: |
          python3 fetch_players.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet players.html players_data.json || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add players.html players_data.json
          git commit -m "chore: auto-update players data $(date +%Y-%m-%d)

          Automated daily update from IPL Fantasy API
          Triggered by: GitHub Actions schedule"
          git push
